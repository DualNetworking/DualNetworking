# ===== MongoDB Verbindung =====
# URI zur lokalen MongoDB-Instanz (Port 27017, Datenbank: dualnet)
spring.data.mongodb.uri=mongodb://localhost:27017/dualnet

# ===== JWT Konfiguration =====
# Geheimschlüssel für das Signieren der JWT-Tokens (mindestens 32 Zeichen!)
# WICHTIG: In der Produktion durch einen sicheren Schlüssel ersetzen!
jwt.secret=DualNetSecretKey2024PleaseChangeThisInProduction!!
# Token-Ablaufzeit in Millisekunden (86400000 = 24 Stunden)
jwt.expiration=86400000

# ===== Server =====
server.port=8080

# ===== Logging =====
# Zeigt mehr Details beim Starten (hilfreich für Debugging)
logging.level.com.dualnet=DEBUG
