# CI-Pipeline für das Frontend
# Läuft automatisch bei jedem Push und Pull Request
name: Frontend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'frontend/**'   # Nur auslösen wenn Frontend-Dateien geändert wurden
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Schritt 1: Code aus dem Repository laden
      - name: Code laden
        uses: actions/checkout@v4

      # Schritt 2: Node.js 20 installieren
      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Schritt 3: Abhängigkeiten installieren (npm ci ist schneller und reproduzierbar)
      - name: Abhängigkeiten installieren
        working-directory: ./frontend
        run: npm ci

      # Schritt 4: Unit-Tests ausführen
      - name: Tests ausführen
        working-directory: ./frontend
        run: npm test

      # Schritt 5: TypeScript kompilieren und App bauen
      - name: Frontend bauen
        working-directory: ./frontend
        run: npm run build

      # Schritt 6: Build-Artefakt speichern (optional, für Deployment nützlich)
      - name: Build-Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
